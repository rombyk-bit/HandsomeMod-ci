name: Build HandsomeMod UFI103S

on:
  repository_dispatch:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.config'
      - 'qcom-msm8916-ufi103s.dts'

env:
  REPO_URL: https://github.com
  REPO_BRANCH: master
  CONFIG_FILE: .config
  SSH_ACTIONS: true
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs gcc-multilib g++-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler antlr3 gperf swig python3-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
 
    - name: Clone source code
      run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH handsomemod

    - name: Inject Custom DTS and Profile
      run: |
        # Создаем структуру папок для DTS в ядре
        mkdir -p handsomemod/target/linux/msm89xx/files/arch/arm/boot/dts/
        
        # Копируем ваш DTS файл (он должен лежать в корне вашего репозитория)
        if [ -f qcom-msm8916-ufi103s.dts ]; then
          cp qcom-msm8916-ufi103s.dts handsomemod/target/linux/msm89xx/files/arch/arm/boot/dts/
        fi

        # Добавляем профиль устройства в msm8916.mk
        cat <<EOF >> handsomemod/target/linux/msm89xx/image/msm8916.mk

        define Device/ufi103s
          DEVICE_TITLE := UFI103S MSM8916 Stick
          DEVICE_DTS := qcom-msm8916-ufi103s
          \$(Device/msm8916-stick)
        endef
        TARGET_DEVICES += ufi103s
        EOF

        # Если файл .config существует в вашем репозитории, копируем его
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE handsomemod/.config

    - name: Update feeds
      run: cd handsomemod && ./scripts/feeds update -a

    - name: Install feeds
      run: cd handsomemod && ./scripts/feeds install -a 

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@main
      if: env.SSH_ACTIONS == 'true' || contains(github.event.action, 'ssh')

    - name: Download package
      id: package
      run: |
        cd handsomemod
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd handsomemod
        echo -e "$(nproc) thread compile"
        # Пытаемся собрать в многопотоке, если ошибка — собираем в один поток для логов
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        # Переходим в папку с собранными образами
        cd handsomemod/bin/targets/msm89xx/default || cd handsomemod/bin/targets/*/*
        rm -rf packages
        # Записываем путь в переменную окружения
        echo "FIRMWARE=$(pwd)" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: HandsomeMod_firmware
        path: $ {{ env.FIRMWARE }}
        
