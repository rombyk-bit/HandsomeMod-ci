name: Build HandsomeMod UFI103S

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.config'

env:
  # Твоя ссылка на репозиторий
  REPO_URL: https://github.com/HandsomeMod/HandsomeMod.git
  REPO_BRANCH: master
  CONFIG_FILE: .config
  UPLOAD_FIRMWARE: true
  TZ: Europe/Madrid

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs gcc-multilib g++-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler antlr3 gperf swig python3-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
 
    - name: Clone source code
      run: git clone --depth 1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} handsomemod
      
    - name: Update and Install feeds
      run: |
        cd handsomemod
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Inject UFI103S DTS
      run: |
        cd handsomemod
        # Создаем путь для DTS и подменяем файл
        mkdir -p target/linux/msm89xx/files/arch/arm64/boot/dts/qcom/
        if [ -f "../ufi103s.dts" ]; then
          cp ../ufi103s.dts target/linux/msm89xx/files/arch/arm64/boot/dts/qcom/msm8916-uz801.dts
          echo "DTS injected successfully"
        else
          echo "Error: ufi103s.dts not found!"
          exit 1
        fi

    - name: Load custom configuration
      run: |
        cd handsomemod
        rm -f .config
        # Принудительно подсовываем твой .config и форсируем архитектуру msm89xx
        if [ -f "../.config" ]; then
          cp "../.config" .config
        fi
        
        # Удаляем следы MIPS/ath79 и добавляем ARM64
        sed -i '/CONFIG_TARGET_ath79/d' .config
        echo "CONFIG_TARGET_msm89xx=y" >> .config
        echo "CONFIG_TARGET_msm89xx_msm8916=y" >> .config
        echo "CONFIG_TARGET_msm89xx_msm8916_DEVICE_yiming-uz801v3=y" >> .config
        
        make defconfig

    - name: Download package
      run: |
        cd handsomemod
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd handsomemod
        echo -e "$(nproc) thread compile"
        # Сборка. Если упадет - покажет подробный лог (V=s)
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        mkdir -p firmware_bin
        # Собираем прошивки именно из папки msm89xx
        find handsomemod/bin/targets/msm89xx/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.manifest" \) -exec cp {} firmware_bin/ \; || true
        echo "FIRMWARE=$PWD/firmware_bin" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: HandsomeMod_UFI103S_ARM64
        path: ${{ env.FIRMWARE }}/*
        
