name: Build HandsomeMod UFI103S

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.config'

env:
  REPO_URL: https://github.com/HandsomeMod/HandsomeMod.git
  REPO_BRANCH: master
  CONFIG_FILE: .config
  UPLOAD_FIRMWARE: true
  TZ: Europe/Madrid

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs gcc-multilib g++-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler antlr3 gperf swig python3-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
 
    - name: Clone source code
      run: git clone --depth 1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} handsomemod
      
    - name: Update and Install feeds
      run: |
        cd handsomemod
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Inject UFI103S DTS
      run: |
        cd handsomemod
        # Создаем структуру папок внутри склонированного репозитория
        mkdir -p target/linux/msm89xx/files/arch/arm64/boot/dts/qcom/
        if [ -f "../ufi103s.dts" ]; then
          # Подменяем стандартный файл uz801 твоим ufi103s.dts
          cp ../ufi103s.dts target/linux/msm89xx/files/arch/arm64/boot/dts/qcom/msm8916-uz801.dts
          echo "DTS injected successfully"
        else
          echo "Error: ufi103s.dts not found in repository root!"
          exit 1
        fi

    - name: Load custom configuration
      run: |
        # Копируем твой .config в папку сборки
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE handsomemod/.config
        cd handsomemod
        make defconfig

    - name: Download package
      run: |
        cd handsomemod
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd handsomemod
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        mkdir -p firmware_bin
        # Собираем все прошивки из папки bin
        find handsomemod/bin/targets/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.manifest" \) -exec cp {} firmware_bin/ \;
        echo "FIRMWARE=$PWD/firmware_bin" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: HandsomeMod_ufi103s_firmware
        path: ${{ env.FIRMWARE }}/*
        
