#=================================================
# https://github.com
# Description: Build HandsomeMod using GitHub Actions
#=================================================

name: Build HandsomeMod UFI103S

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.config'

env:
  REPO_URL: https://github.com/HandsomeYingyan/HandsomeMod.git
  REPO_BRANCH: master
  TZ: Europe/Madrid

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        # Устанавливаем зависимости + python-is-python3 для прохождения проверки (заменяет python 2.x)
        sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs gcc-multilib g++-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler antlr3 gperf swig python3-dev python-is-python3
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: git clone --depth 1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} handsomemod
      
    - name: Update and Install feeds
      run: |
        cd handsomemod
        # Удаляем локальный IP разработчика, который вызывает Connection Timeout
        sed -i '/192.168.21.206/d' feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Inject UFI103S DTS
      run: |
        DTS_PATH="handsomemod/target/linux/msm89xx/files/arch/arm64/boot/dts/qcom"
        mkdir -p $DTS_PATH
        if [ -f "ufi103s.dts" ]; then
          cp -f "ufi103s.dts" "$DTS_PATH/msm8916-uz801.dts"
          echo "✅ DTS успешно внедрен"
        else
          echo "⚠️ ПРЕДУПРЕЖДЕНИЕ: ufi103s.dts не найден в корне!"
        fi

    - name: Load custom configuration
      run: |
        cd handsomemod
        # Подтягиваем .config из корня репозитория или создаем пустой
        [ -f "../.config" ] && cp -f "../.config" .config || touch .config
        
        # Очищаем старые таргеты и принудительно ставим нужный
        sed -i '/CONFIG_TARGET_ath79/d' .config || true
        sed -i '/CONFIG_TARGET_msm89xx/d' .config || true
        {
          echo "CONFIG_TARGET_msm89xx=y"
          echo "CONFIG_TARGET_msm89xx_msm8916=y"
          echo "CONFIG_TARGET_msm89xx_msm8916_DEVICE_yiming-uz801v3=y"
        } >> .config
        
        # Генерируем финальную конфигурацию
        make defconfig

    - name: Download package
      run: |
        cd handsomemod
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd handsomemod
        echo -e "$(nproc) thread compile"
        # Основная сборка
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        mkdir -p firmware_bin
        # Ищем образы в папке msm89xx
        find handsomemod/bin/targets/msm89xx/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.manifest" -o -name "*.gz" \) -exec cp {} firmware_bin/ \; || true
        echo "FIRMWARE=$PWD/firmware_bin" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: HandsomeMod_UFI103S_ARM64
        path: ${{ env.FIRMWARE }}/*
        
