name: Build HandsomeMod UFI103S

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.config'

env:
  REPO_URL: https://github.com/HandsomeYingyan/HandsomeMod.git
  REPO_BRANCH: master
  TZ: Europe/Madrid

jobs:
  build:
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo add-apt-repository ppa:deadsnakes/ppa -y
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs gcc-multilib g++-multilib p7zip p7zip-full msmtp libssl-dev texinfo libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint device-tree-compiler antlr3 gperf swig python3-dev python2.7 python2.7-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo ln -sf /usr/bin/python2.7 /usr/bin/python

    - name: Clone source code
      run: git clone --depth 1 ${{ env.REPO_URL }} -b ${{ env.REPO_BRANCH }} handsomemod
      
    - name: Update and Install feeds
      run: |
        cd handsomemod
        sed -i '/192.168.21.206/d' feeds.conf.default
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Inject UFI103S DTS
      run: |
        DTS_PATH="handsomemod/target/linux/msm89xx/files/arch/arm64/boot/dts/qcom"
        mkdir -p $DTS_PATH
        if [ -f "ufi103s.dts" ]; then
          cp -f "ufi103s.dts" "$DTS_PATH/msm8916-uz801.dts"
          echo "✅ DTS внедрен"
        fi

    - name: Load custom configuration
      run: |
        cd handsomemod
        [ -f "../.config" ] && cp -f "../.config" .config || touch .config
        sed -i '/CONFIG_TARGET_ath79/d' .config || true
        sed -i '/CONFIG_TARGET_msm89xx/d' .config || true
        {
          echo "CONFIG_TARGET_msm89xx=y"
          echo "CONFIG_TARGET_msm89xx_msm8916=y"
          echo "CONFIG_TARGET_msm89xx_msm8916_DEVICE_yiming-uz801v3=y"
        } >> .config
        
        # ХАК: Принудительно создаем файлы успешной проверки зависимостей
        mkdir -p staging_dir/host
        touch staging_dir/host/.prereq-build
        
        make defconfig FORCE=1

    - name: Download package
      run: |
        cd handsomemod
        make download -j8 FORCE=1
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd handsomemod
        # Еще раз убеждаемся, что флаг прохода создан перед компиляцией
        mkdir -p staging_dir/host
        touch staging_dir/host/.prereq-build
        
        echo -e "$(nproc) thread compile"
        make -j$(nproc) FORCE=1 || make -j1 V=s FORCE=1
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        mkdir -p firmware_bin
        find handsomemod/bin/targets/msm89xx/ -type f \( -name "*.bin" -o -name "*.img" -o -name "*.manifest" -o -name "*.gz" \) -exec cp {} firmware_bin/ \; || true
        echo "FIRMWARE=$PWD/firmware_bin" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: HandsomeMod_UFI103S_ARM64
        path: ${{ env.FIRMWARE }}/*
